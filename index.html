<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1С: Кабинет сотрудника — инструкции</title>
  <style>
    /* ----- сброс и база ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f4f7fd 0%, #e6ecf5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      padding: 20px;
    }

    /* карточка — стеклянный эффект */
    .card {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 56px;
      padding: 40px 36px 48px;
      box-shadow: 0 24px 48px -16px rgba(0, 20, 40, 0.20),
                  0 6px 16px -6px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
      transition: 0.2s;
    }

    /* ----- ЗАГОЛОВОК: светлый, округлый, поменьше ----- */
    h1 {
      font-size: 2.8rem;          /* уменьшен против прошлого 3.8rem */
      font-weight: 500;           /* не жирный, более «округлый» */
      letter-spacing: -0.01em;
      color: #2f4b7a;             /* светлее, чем #0a1e3c, мягкий синий */
      background: linear-gradient(135deg, #3d5f94, #5a7bb3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 12px rgba(60, 100, 180, 0.12);
      line-height: 1.2;
      margin-bottom: 12px;
      word-break: break-word;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* декоративная линия — тоже светлая и мягкая */
    .title-underline {
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, #a0bde6, #c3d6f5);
      border-radius: 20px;
      margin: 8px auto 32px auto;
      box-shadow: 0 2px 8px rgba(60, 120, 200, 0.10);
    }

    /* ----- СЕТКА КНОПОК (две большие квадратные + маленькая) ----- */
    .button-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 24px 28px;
      margin: 8px 0 12px 0;
    }

    /* большие квадратные кнопки 5х5 (сохраняем пропорцию) */
    .btn-square {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 260px;
      aspect-ratio: 1 / 1;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 16px 14px;
      text-decoration: none;
      color: #1f3a5e;
      font-weight: 570;
      font-size: 1.5rem;
      line-height: 1.3;
      text-align: center;
      box-shadow: 0 10px 24px -10px rgba(20, 40, 80, 0.12),
                  0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: 0.25s ease;
      word-break: break-word;
      flex: 1 1 180px;
      letter-spacing: 0.01em;
    }

    /* иконка-эмоджи для больших кнопок */
    .btn-square .emoji-big {
      display: block;
      font-size: 2.8rem;
      line-height: 1;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.02));
    }

    /* каждая кнопка со своим легким оттенком */
    .btn-square:first-child {
      background: linear-gradient(145deg, #ffffff, #f1f7ff);
      border-color: #c7dbfa;
    }
    .btn-square:last-child {
      background: linear-gradient(145deg, #ffffff, #fbf3ea);
      border-color: #f5dcc6;
    }

    .btn-square:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 36px -12px rgba(20, 50, 100, 0.25);
      background: #ffffff;
      border-color: #4a7fc7;
    }
    .btn-square:last-child:hover {
      border-color: #cc8f5a;
    }
    .btn-square:active {
      transform: scale(0.96);
      transition: 0.08s;
    }

    /* ----- МАЛЕНЬКАЯ КНОПКА «Видео-инструкции» ----- */
    .btn-small {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 12px 32px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(2px);
      border: 1px solid #cfdff5;
      border-radius: 60px;        /* сильно скругленная */
      color: #1f3f6b;
      font-weight: 550;
      font-size: 1.1rem;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(0, 20, 40, 0.04);
      transition: 0.2s ease;
      letter-spacing: 0.3px;
      background: #f4f9ff;
      border-color: #b8cef0;
    }

    .btn-small:hover {
      background: #ffffff;
      border-color: #4f7fc7;
      box-shadow: 0 8px 20px -8px rgba(40, 90, 180, 0.25);
      transform: translateY(-2px);
    }
    .btn-small:active {
      transform: scale(0.96);
    }

    /* иконка внутри маленькой кнопки */
    .btn-small .icon-video {
      font-size: 1.4rem;
      line-height: 1;
    }

    /* ----- доп. футер (декор) ----- */
    .sub-footer {
      margin-top: 36px;
      font-size: 0.85rem;
      color: #5f6f88;
      opacity: 0.6;
      border-top: 1px solid rgba(0,0,0,0.04);
      padding-top: 24px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sub-footer span {
      background: rgba(255,255,255,0.3);
      padding: 4px 16px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    /* ----- АДАПТИВНОСТЬ ----- */
    @media (max-width: 640px) {
      .card {
        padding: 28px 18px 32px;
        border-radius: 40px;
      }

      h1 {
        font-size: 2.1rem;        /* на мобилках ещё меньше */
      }

      .btn-square {
        max-width: 200px;
        font-size: 1.2rem;
        border-radius: 28px;
        padding: 12px 10px;
        flex: 1 1 140px;
      }
      .btn-square .emoji-big {
        font-size: 2.4rem;
        margin-bottom: 6px;
      }

      .btn-small {
        padding: 10px 24px;
        font-size: 1rem;
      }

      .title-underline {
        width: 70px;
        margin-bottom: 24px;
      }
    }

    @media (max-width: 430px) {
      h1 {
        font-size: 1.7rem;
      }
      .btn-square {
        max-width: 160px;
        font-size: 1rem;
        border-radius: 24px;
        flex: 1 1 120px;
      }
      .btn-square .emoji-big {
        font-size: 2rem;
      }
      .btn-small {
        padding: 8px 18px;
        font-size: 0.9rem;
      }
    }

    /* крупные экраны — кнопки чуть больше, но пропорция 5х5 сохраняется */
    @media (min-width: 1200px) {
      .btn-square {
        max-width: 300px;
        font-size: 1.7rem;
      }
      .btn-square .emoji-big {
        font-size: 3.4rem;
      }
      h1 {
        font-size: 3.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- ЗАГОЛОВОК: светлый, округлый, уменьшенный -->
    <h1>Инструкции по работе с сервисом<br>1С: Кабинет сотрудника</h1>
    <div class="title-underline"></div>

    <!-- БЛОК КНОПОК: две большие квадратные + маленькая -->
    <div class="button-grid">
      <!-- 1. Работник -->
      <a href="https://disk.yandex.ru/client/disk/1С%3A%20Кабинет%20сотрудника/Инструкции%20для%20работников"
         target="_blank"
         rel="noopener noreferrer"
         class="btn-square">
        <span class="emoji-big">👤</span>
        Работник
      </a>

      <!-- 2. Административный персонал -->
      <a href="https://disk.yandex.ru/client/disk/1С%3A%20Кабинет%20сотрудника/Руководство%20пользователя%201С%3A%20Кабинет%20сотрудника"
         target="_blank"
         rel="noopener noreferrer"
         class="btn-square">
        <span class="emoji-big">📋</span>
        Административный<br>персонал
      </a>
    </div>

    <!-- МАЛЕНЬКАЯ КНОПКА Видео-инструкции (ссылка — пока на главную страницу диска, но можно заменить) -->
    <div style="margin-top: 8px;">
      <a href="https://disk.yandex.ru/client/disk/1С%3A%20Кабинет%20сотрудника"
         target="_blank"
         rel="noopener noreferrer"
         class="btn-small">
        <span class="icon-video">▶</span> Видео-инструкции
      </a>
    </div>

    <!-- небольшой декоративный футер -->
    <div class="sub-footer">
      <span>📎 Яндекс Диск</span>
      <span>🔹 быстрый доступ</span>
    </div>
  </div>
</body>
</html>
