<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1С: Кабинет сотрудника — инструкции</title>
  <style>
    /* Обнуление и база */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f5f7fc 0%, #e9edf5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
    }

    .card {
      max-width: 820px;
      width: 100%;
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 56px;
      padding: 48px 40px 56px;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25),
                  0 8px 24px -6px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: 0.2s;
      text-align: center;
    }

    /* Огромный заголовок */
    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0a1e3c;
      margin-bottom: 24px;
      line-height: 1.15;
      text-shadow: 0 4px 12px rgba(0, 20, 50, 0.08);
      word-break: break-word;
    }

    /* акцентная линия под заголовком (декоративно) */
    .title-underline {
      width: 120px;
      height: 5px;
      background: #2a6df4;
      border-radius: 8px;
      margin: 0 auto 40px auto;
      box-shadow: 0 4px 12px rgba(42, 109, 244, 0.3);
    }

    /* контейнер для двух кнопок — 5х5 квадраты */
    .button-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin-top: 12px;
    }

    /* каждая кнопка — квадрат 5 на 5 (в rem, но с адаптивом) */
    .btn-square {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 280px;   /* чтобы на узких экранах не расползались */
      aspect-ratio: 1 / 1; /* строгий квадрат */
      background: #ffffff;
      border-radius: 32px;  /* крупное скругление */
      padding: 20px 16px;
      text-decoration: none;
      color: #0a1e3c;
      font-weight: 600;
      font-size: 1.6rem;
      line-height: 1.3;
      text-align: center;
      box-shadow: 0 12px 28px -8px rgba(0, 20, 40, 0.15),
                  0 4px 12px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.7);
      transition: 0.25s ease;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(2px);
      word-break: break-word;
      flex: 1 1 200px;    /* минимальная ширина 200px, растягиваются */
    }

    /* иконка-акцент (эмодзи) для каждой кнопки */
    .btn-square .emoji-big {
      display: block;
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.05));
    }

    /* первая кнопка – чуть другой оттенок */
    .btn-square:first-child {
      background: linear-gradient(135deg, #ffffff 0%, #f2f6ff 100%);
      border-color: #b3ceff;
    }

    /* вторая кнопка – тёплый акцент */
    .btn-square:last-child {
      background: linear-gradient(135deg, #ffffff 0%, #faf3e8 100%);
      border-color: #ffdbb5;
    }

    /* ховеры */
    .btn-square:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 24px 44px -12px rgba(0, 30, 70, 0.3);
      background: #ffffff;
      border-color: #2a6df4;
    }

    .btn-square:last-child:hover {
      border-color: #e68a2e;
    }

    .btn-square:active {
      transform: scale(0.97);
      transition: 0.08s;
    }

    /* дополнительный текст (подпись) */
    .sub-footer {
      margin-top: 44px;
      font-size: 0.9rem;
      color: #3f4e66;
      opacity: 0.7;
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(0,0,0,0.04);
      padding-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sub-footer span {
      background: rgba(255,255,255,0.4);
      padding: 6px 18px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    /* адаптив для маленьких экранов */
    @media (max-width: 600px) {
      .card {
        padding: 32px 18px 36px;
        border-radius: 36px;
      }

      h1 {
        font-size: 2.6rem;
      }

      .btn-square {
        max-width: 240px;
        font-size: 1.3rem;
        border-radius: 28px;
        padding: 16px 12px;
        flex: 1 1 160px;
      }

      .btn-square .emoji-big {
        font-size: 2.6rem;
        margin-bottom: 8px;
      }

      .title-underline {
        width: 80px;
        height: 4px;
        margin-bottom: 28px;
      }

      .button-grid {
        gap: 20px;
      }
    }

    @media (max-width: 440px) {
      h1 {
        font-size: 2.1rem;
      }
      .btn-square {
        max-width: 200px;
        font-size: 1.1rem;
        border-radius: 24px;
        flex: 1 1 140px;
      }
      .btn-square .emoji-big {
        font-size: 2.2rem;
      }
    }

    /* Для очень крупных экранов — сохраняем квадрат 5х5 в условных единицах */
    @media (min-width: 1200px) {
      .btn-square {
        max-width: 320px;
        font-size: 1.9rem;
      }
      .btn-square .emoji-big {
        font-size: 4rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- ОГРОМНЫЙ ЗАГОЛОВОК -->
    <h1>Инструкции по работе с сервисом<br>1С: Кабинет сотрудника</h1>
    <div class="title-underline"></div>

    <!-- ДВЕ КВАДРАТНЫЕ КНОПКИ 5х5 (с сохранением пропорций) -->
    <div class="button-grid">
      <!-- первая кнопка -->
      <a href="https://disk.yandex.ru/client/disk/1С%3A%20Кабинет%20сотрудника/Инструкции%20для%20работников" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="btn-square">
        <span class="emoji-big">👤</span>
        Инструкции для работников
      </a>

      <!-- вторая кнопка -->
      <a href="https://disk.yandex.ru/client/disk/1С%3A%20Кабинет%20сотрудника/Руководство%20пользователя%201С%3A%20Кабинет%20сотрудника" 
         target="_blank" 
         rel="noopener noreferrer" 
         class="btn-square">
        <span class="emoji-big">📋</span>
        Инструкции для кадровиков, руководителей‑подписантов, согласующих
      </a>
    </div>

    <!-- небольшая декоративная подпись (не обязательная, но уместна) -->
    <div class="sub-footer">
      <span>🔹 перейти по ссылке</span>
      <span>📎 Яндекс Диск</span>
    </div>
  </div>
</body>
</html>
